<!-- 🔒 Guard: block direct access without login -->
<script>
  (function () {
    const BACKEND_URL = "https://login-0070.onrender.com"; // <- troque se sua URL for outra
    // hide page until auth check completes
    document.documentElement.style.visibility = "hidden";

    fetch(`${BACKEND_URL}/auth/me`, { credentials: "include" })
      .then(r => {
        if (!r.ok) throw new Error("not-auth");
        return r.json().catch(() => ({}));
      })
      .then(() => {
        document.documentElement.style.visibility = "visible";
      })
      .catch(() => {
        // redirect to login
        window.location.replace("/login.html");
      });
  })();
</script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>

  :root{
    --text:#2a2a2a;
    --muted:#6f6f6f;
    --gold:#D4AF37;
    --gold-light:#F5D76E;
    --gold-deep:#8D6E21;
    --accent: var(--gold);
    --bg1:#fdf4e3;
    --bg2:#f1dfc2;
    --bg3:#e3c395;
    --shadow-strong: 0 18px 42px rgba(0,0,0,.32);
    --radius:28px;
    --orange: var(--gold);
    --white:#ffffff;
    --black:#0d0d0d;
    --green:#28a745;
    --red:#c0392b;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    font-family: Poppins, system-ui, -apple-system, Segoe UI, Arial, sans-serif;
    color: var(--text);
    background: linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));
    min-height:100dvh;
    padding:24px 10px;
    overflow-x:hidden;
  }

  /* fundo reativo (canvas) */
  #reactiveField{
    position:fixed;
    inset:0;
    z-index:0;
    pointer-events:none;
  }

  .wrap{
    max-width:1180px;
    margin:0 auto 32px;
    position:relative;
    z-index:1;
  }

  .card{
    padding:26px 22px 38px;
    background: linear-gradient(135deg, rgba(253,244,227,0.10), rgba(241,223,194,0.08), rgba(227,195,149,0.14));
    backdrop-filter: saturate(120%) blur(6px);
    -webkit-backdrop-filter: saturate(120%) blur(6px);
    border-radius: var(--radius);
    border:1px solid rgba(212,175,55,.55);
    box-shadow: var(--shadow-strong), 0 0 26px rgba(212,175,55,.22);
  }

  /* Header (logo + subtítulo) */
  .panel-header{ text-align:center; margin-bottom:18px; }
  .brand-neo{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    padding:12px 18px;
    border-radius:18px;
    border:1px solid rgba(212,175,55,.80);
    background: rgba(255,255,255,.10);
    box-shadow: 0 14px 34px rgba(0,0,0,.18), 0 0 18px rgba(212,175,55,.18);
    position:relative;
    overflow:hidden;
  }
  .brand-neo::before{
    content:"";
    position:absolute;
    inset:-40%;
    background: radial-gradient(circle, rgba(245,215,110,.35), rgba(212,175,55,.06), transparent 60%);
    filter: blur(6px);
    animation: glowMove 8s linear infinite;
  }
  @keyframes glowMove{
    0%{ transform: translate(-12%,-8%) rotate(0deg); }
    50%{ transform: translate(10%,8%) rotate(180deg); }
    100%{ transform: translate(-12%,-8%) rotate(360deg); }
  }
  .brand-text{
    font-family: Orbitron, Poppins, system-ui, Arial, sans-serif;
    letter-spacing: .22em;
    font-weight: 700;
    font-size: clamp(22px, 4.6vw, 34px);
    color: rgba(42,42,42,.92);
    text-shadow: 0 1px 0 rgba(255,255,255,.5);
    position:relative;
    z-index:1;
    padding-left:.22em; /* compensar tracking visual */
  }
  .panel-subtitle{
    margin-top:10px;
    font-weight:600;
    letter-spacing:.12em;
    color: rgba(42,42,42,.86);
    text-transform:uppercase;
    font-size: 13px;
  }

  /* layout */
  .top-actions{
    display:flex;
    justify-content:center;
    margin: 14px 0 18px;
  }

  .container{
    display:flex;
    gap:18px;
    flex-wrap:wrap;
    align-items:flex-start;
  }

  .form-section, .list-section{
    flex: 1 1 480px;
    padding: 18px;
    border-radius: 20px;
    background: rgba(255,255,255,.10);
    border:1px solid rgba(212,175,55,.45);
    box-shadow: 0 10px 26px rgba(0,0,0,.18);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }

  h2{
    font-size:18px;
    letter-spacing:.04em;
    margin-bottom:10px;
    color: rgba(42,42,42,.92);
  }

  .form{ display:flex; flex-direction:column; gap:12px; }

  label{
    font-size:13px;
    font-weight:600;
    color: rgba(42,42,42,.85);
    letter-spacing:.02em;
    margin-top:4px;
  }

  input, textarea, select{
    width:100%;
    padding: 12px 12px;
    border-radius: 12px;
    border:1px solid rgba(212,175,55,.38);
    background: rgba(255,255,255,.62);

  input:focus, textarea:focus, select:focus{

  /* botões */
  button, .upload-btn, .config-btn{

</style>

<!-- All scripts are placed LAST to ensure elements exist -->
<script>
(() => {
  // Campo reativo dourado (mesmo efeito do Artesanato)
  const GOLD = getComputedStyle(document.documentElement).getPropertyValue('--gold').trim() || '#D4AF37';
  const GOLD_LIGHT = getComputedStyle(document.documentElement).getPropertyValue('--gold-light').trim() || '#F5D76E';
  const GOLD_DEEP = getComputedStyle(document.documentElement).getPropertyValue('--gold-deep').trim() || '#8D6E21';

  const MAX_PARTICLES_BASE = 135;
  const LINK_DIST = 170;
  const SAFETY_MARGIN = 22;
  const MOUSE_REPEL_RADIUS = 120 + SAFETY_MARGIN;
  const MOUSE_FORCE = 0.14;
  const SPEED = 0.55;
  const FRICTION = 0.965;
  const CURVE = true;
  const GLOW = true;

  const canvas = document.getElementById('reactiveField');
  if (!canvas) return;
  const ctx = canvas.getContext('2d', { alpha: true });
  let DPR = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
  let W = 0, H = 0;

  function resize(){
    W = canvas.clientWidth = window.innerWidth;
    H = canvas.clientHeight = window.innerHeight;
    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    ctx.setTransform(DPR,0,0,DPR,0,0);
  }
  resize();

  window.addEventListener('resize', () => {
    DPR = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
    resize();
    init();
  });

  const pts = [];
  function rand(min,max){ return Math.random()*(max-min)+min; }

  function init(){
    pts.length = 0;
    const area = W * H;
    const target = Math.min(250, Math.round(MAX_PARTICLES_BASE * (area / (1200*900))));
    for(let i=0;i<target;i++){
      pts.push({
        x: rand(0,W),
        y: rand(0,H),
        vx: rand(-SPEED,SPEED),
        vy: rand(-SPEED,SPEED),
        r: rand(2.1,3.6)
      });
    }
  }
  init();

  const mouse = { x:-9999, y:-9999, active:false };
  document.addEventListener('mousemove', (e)=>{
    mouse.x = e.clientX;
    mouse.y = e.clientY;
    mouse.active = true;
  }, {passive:true});
  document.addEventListener('mouseleave', ()=>{ mouse.active = false; }, {passive:true});

  function drawDot(p){
    const g = ctx.createRadialGradient(p.x-1, p.y-1, 0, p.x, p.y, p.r*1.6);
    g.addColorStop(0, GOLD_LIGHT);
    g.addColorStop(0.55, GOLD);
    g.addColorStop(1, GOLD_DEEP);
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
    if(GLOW){
      ctx.save();
      ctx.globalAlpha = .25;
      ctx.shadowColor = GOLD;
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fill();
      ctx.restore();
    }
  }

  function drawLink(a,b,dist){
    const t = 1 - (dist / LINK_DIST);
    const lw = 1 + t * 2.2;
    const alpha = 0.12 + t * 0.6;

    const grad = ctx.createLinearGradient(a.x, a.y, b.x, b.y);
    grad.addColorStop(0, GOLD);
    grad.addColorStop(0.5, GOLD_LIGHT);
    grad.addColorStop(1, GOLD);

    ctx.strokeStyle = grad;
    ctx.lineWidth = lw;
    ctx.globalAlpha = alpha;

    if(CURVE){
      const mx = (a.x + b.x)/2, my = (a.y + b.y)/2;
      const dx = b.x - a.x, dy = b.y - a.y;
      const len = Math.hypot(dx,dy) || 1;
      const nx = -dy/len, ny = dx/len;
      const bend = 10 + 26 * t;
      const cx = mx + nx * bend;
      const cy = my + ny * bend;
      ctx.beginPath();
      ctx.moveTo(a.x,a.y);
      ctx.quadraticCurveTo(cx,cy,b.x,b.y);
      ctx.stroke();
    }else{
      ctx.beginPath();
      ctx.moveTo(a.x,a.y);
      ctx.lineTo(b.x,b.y);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  function step(){
    ctx.clearRect(0,0,W,H);

    for(const p of pts){
      if(mouse.active){
        const dx = p.x - mouse.x;
        const dy = p.y - mouse.y;
        const d2 = dx*dx + dy*dy;
        const r2 = MOUSE_REPEL_RADIUS * MOUSE_REPEL_RADIUS;
        if(d2 < r2){
          const d = Math.sqrt(d2) || 0.0001;
          const force = (1 - d / MOUSE_REPEL_RADIUS) * MOUSE_FORCE;
          p.vx += (dx / d) * force * 5.0;
          p.vy += (dy / d) * force * 5.0;
        }
      }

      p.vx += (Math.random()-0.5)*0.02;
      p.vy += (Math.random()-0.5)*0.02;

      p.vx *= FRICTION;
      p.vy *= FRICTION;
      p.x += p.vx;
      p.y += p.vy;

      if(p.x < 0){ p.x = 0; p.vx = Math.abs(p.vx); }
      if(p.x > W){ p.x = W; p.vx = -Math.abs(p.vx); }
      if(p.y < 0){ p.y = 0; p.vy = Math.abs(p.vy); }
      if(p.y > H){ p.y = H; p.vy = -Math.abs(p.vy); }
    }

    for(let i=0;i<pts.length;i++){
      for(let j=i+1;j<pts.length;j++){
        const a = pts[i], b = pts[j];
        const dx = b.x - a.x, dy = b.y - a.y;
        const dist = Math.hypot(dx,dy);
        if(dist < LINK_DIST){
          drawLink(a,b,dist);
        }
      }
    }

    for(const p of pts) drawDot(p);
    requestAnimationFrame(step);
  }
  step();
})();
</script>
<script>
(function(){
  'use strict';

  // --- Utilities ---
  const $ = (id) => document.getElementById(id);
  const on = (el, ev, cb) => el && el.addEventListener(ev, cb);
  const text = (el, t) => { if(el) el.textContent = t; };

  function decodeBase64Utf8(b64){
    try{
      b64 = (b64 || '').replace(/\\n/g,'');
      if('TextDecoder' in window){
        const bin = atob(b64);
        const bytes = new Uint8Array(bin.length);
        for(let i=0;i<bin.length;i++) bytes[i] = bin.charCodeAt(i);
        return new TextDecoder().decode(bytes);
      }
      return decodeURIComponent(escape(atob(b64 || '')));
    }catch(e){ return atob(b64 || ''); }
  }
  function encodeBase64Utf8(str){
    try{
      if('TextEncoder' in window){
        const bytes = new TextEncoder().encode(str);
        let bin = '';
        bytes.forEach(b => bin += String.fromCharCode(b));
        return btoa(bin);
      }
      return btoa(unescape(encodeURIComponent(str)));
    }catch(e){ return btoa(str || ''); }
  }

  // --- State ---
  let produtos = [];
  let editIndex = null;
  let editPendingUploads = []; // {file, url}
  let editImageList = [];
  let editExistingCount = 0;

  // --- GitHub helpers ---
  async function carregarProdutosGitHub(){
    const cfg = JSON.parse(localStorage.getItem('ghConfig')||'{}');
    if(!cfg.repo || !cfg.branch || !cfg.path || !cfg.token) return;
    try {
      const res = await fetch(`https://api.github.com/repos/${cfg.repo}/contents/${cfg.path}?ref=${cfg.branch}`, {
        headers: { Authorization: `token ${cfg.token}` }
      });
      if(res.ok){
        const data = await res.json();
        const raw = decodeBase64Utf8(data.content || '');
        produtos = JSON.parse(raw || '[]');
        renderProdutos();
      }
    } catch(e){
      console.error("Error loading products:", e);
    }
  }

  async function salvarNoGitHub(produtosNovos){
    const cfg = JSON.parse(localStorage.getItem('ghConfig')||'{}');
    if(!cfg.repo || !cfg.branch || !cfg.path || !cfg.token){
      alert("Preencha as configurações do GitHub primeiro.");
      return false;
    }
    const url = `https://api.github.com/repos/${cfg.repo}/contents/${cfg.path}`;
    let sha = null;

    try {
      const res = await fetch(url+`?ref=${cfg.branch}`, {
        headers: { "Authorization": `token ${cfg.token}`, "Accept": "application/vnd.github+json" }
      });
      if(res.ok){
        const data = await res.json();
        sha = data.sha;
      }
    } catch(e){ console.error("Error getting SHA:", e); }

    produtosNovos = (produtosNovos || []).map(p => ({
      ...p,
      title: p.title ?? 'Untitled',
      description: p.description ?? '',
      category: p.category || 'uncategorized',
      price: Number(p.price || 0),
      stock: Number.isFinite(p.stock) ? p.stock : parseInt(p.stock || '0', 10),
      gallery: (Array.isArray(p.gallery) ? p.gallery.filter(Boolean) : (p.gallery ? [p.gallery] : [])).filter(u => u && u !== p.image).filter((u, idx, arr) => arr.indexOf(u) === idx),
      image: p.image || '',
      createdAt: p.createdAt || Date.now(),
      status: p.status || 'published',
      id: p.id || String(p.ID || Date.now())
    }));

    const novoConteudo = encodeBase64Utf8(JSON.stringify(produtosNovos, null, 2));
    const body = { message: "Update products.json via panel", branch: cfg.branch, content: novoConteudo };
    if(sha) body.sha = sha;

    try {
      const putRes = await fetch(url, {
        method: "PUT",
        headers: {
          "Authorization": `token ${cfg.token}`,
          "Accept": "application/vnd.github+json",
          "Content-Type": "application/json"
        },
        body: JSON.stringify(body)
      });

      if(putRes.ok){
        const box = $("alertBox");
        if(box){
          box.textContent = "✅ Enviado — publicação concluída!";
          box.classList.add("success");
          box.style.display = "block";
          setTimeout(()=> box.style.display="none", 3000);
        }
        try { await carregarProdutosGitHub(); } catch(_) {}
        return true;
      } else {
        const txt = await putRes.text().catch(()=> "");
        alert("Erro ao salvar no GitHub: " + putRes.status + (txt ? "\\n" + txt : ""));
        return false;
      }
    } catch(e){
      alert("Erro ao salvar no GitHub: " + e.message);
      return false;
    }
  }

  async function uploadImagens(produtoId, files){
    const cfg = JSON.parse(localStorage.getItem('ghConfig')||'{}');
    const uploadedLinks = [];
    for(let i=0; i<files.length; i++){
      const file = files[i];
      const reader = new FileReader();
      const base64 = await new Promise(res=>{
        reader.onload = () => res(reader.result.split(",")[1]);
        reader.readAsDataURL(file);
      });

      const imgPath = `products/${produtoId}/${file.name.replace(/\\s+/g,'_')}`;
      const url = `https://api.github.com/repos/${cfg.repo}/contents/${imgPath}`;
      await fetch(url, {
        method: "PUT",
        headers: { "Authorization": `token ${cfg.token}`, "Content-Type": "application/json" },
        body: JSON.stringify({
          message: `Add image ${file.name} of product ${produtoId}`,
          branch: cfg.branch,
          content: base64
        })
      });

      uploadedLinks.push(`https://raw.githubusercontent.com/${cfg.repo}/${cfg.branch}/${imgPath}`);
    }
    return uploadedLinks;
  }

  async function downloadProductsJson(){
    const cfg = JSON.parse(localStorage.getItem('ghConfig')||'{}');
    let content = null;
    if(produtos && produtos.length){
      content = JSON.stringify(produtos, null, 2);
    } else if(cfg.repo && cfg.branch && cfg.path && cfg.token){
      try{
        const res = await fetch(`https://api.github.com/repos/${cfg.repo}/contents/${cfg.path}?ref=${cfg.branch}`, {
          headers: { Authorization: `token ${cfg.token}` }
        });
        if(res.ok){
          const data = await res.json();
          content = decodeBase64Utf8(data.content || '');
        } else {
          content = '[]';
        }
      }catch(e){ content = '[]'; }
    } else {
      content = '[]';
    }

    const blob = new Blob([content], { type: 'application/json;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'products.json';
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(()=> URL.revokeObjectURL(url), 1000);
  }

  // --- UI rendering ---
  function renderProdutos() {
    const lista = $("listaProdutos");
    if(!lista) return;
    lista.innerHTML = '';
    produtos.forEach((p, i) => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${p.title || ''}</td>
        <td>€ ${Number(p.price || 0).toFixed(2)}</td>
        <td>${p.category || ''}</td>
        <td>${Number.isFinite(p.stock) ? p.stock : parseInt(p.stock || '0', 10)}</td>
        <td>${p.createdAt ? new Date(p.createdAt).toLocaleDateString() : ''}</td>
        <td><div class='action-buttons'><button data-edit="${i}">Editar</button><button data-del="${i}">Excluir</button></div></td>
      `;
      lista.appendChild(tr);
    });

    // bind action buttons using delegation
    lista.querySelectorAll("[data-edit]").forEach(btn => {
      on(btn, 'click', () => editarProduto(parseInt(btn.getAttribute('data-edit'))));
    });
    lista.querySelectorAll("[data-del]").forEach(btn => {
      on(btn, 'click', async () => {
        const idx = parseInt(btn.getAttribute('data-del'));
        if(Number.isInteger(idx)){
          produtos.splice(idx,1);
          await salvarNoGitHub(produtos);
          renderProdutos();
        }
      });
    });
  }

  // --- Create form ---
  on($("fotos"), 'change', (e) => {
    const files = Array.from(e.target.files || []);
    const preview = $("preview");
    if(!preview) return;
    preview.innerHTML = '';
    files.forEach((f, i) => {
      const url = URL.createObjectURL(f);
      const div = document.createElement('div');
      div.className = 'preview';
      div.innerHTML = `<input type="radio" name="capa" ${i===0? 'checked' : ''} value="${i}"><img src="${url}" alt="preview">`;
      preview.appendChild(div);
    });
  });

  on($("formProduto"), 'submit', async (e) => {
    e.preventDefault();
    const addBtn = $("addBtn");
    const statusMessage = $("statusMessage");
    const alertBox = $("alertBox");

    const titulo = $("titulo").value;
    const valor = Number($("valor").value || 0);
    const descricao = $("descricao").value;
    const categoria = $("categoria").value;
    const estoque = parseInt($("estoque").value || '0', 10);

    const fotosInput = $("fotos");
    const produtoId = Date.now().toString();
    const fotos = fotosInput.files || [];
    const capaIndex = parseInt(document.querySelector('input[name="capa"]:checked')?.value || 0);

    if(statusMessage){
      text(statusMessage, '⏳ Enviando...');
      statusMessage.className = 'alert info';
      statusMessage.style.display = 'block';
    }
    if(alertBox) alertBox.style.display = 'none';
    if(addBtn){ addBtn.disabled = true; addBtn.textContent = 'Enviando...'; }

    try {
      const uploaded = await uploadImagens(produtoId, fotos);

      const cover = uploaded[capaIndex] || "";
      const galleryClean = (uploaded || [])
        .filter(Boolean)
        .filter((u, i) => i !== capaIndex)
        .filter((u, idx, arr) => arr.indexOf(u) === idx);
      const produto = {
        id: produtoId,
        title: titulo,
        price: valor,
        description: descricao,
        category: categoria,
        stock: estoque,
        image: cover,
        gallery: galleryClean,
        createdAt: Date.now(),
        status: "published"
      };

      produtos.push(produto);
      const ok = await salvarNoGitHub(produtos);
      if(ok){
        if(statusMessage) statusMessage.style.display = 'none';
        $("formProduto").reset();
        $("preview").innerHTML = '';
        renderProdutos();
      } else {
        if(statusMessage){
          text(statusMessage, '❌ Erro ao enviar. Verifique a configuração do GitHub.');
          statusMessage.className = 'alert error';
          statusMessage.style.display = 'block';
        }
      }
    } catch(e){
      if(statusMessage){
        text(statusMessage, '❌ Falha: ' + (e.message || e));
        statusMessage.className = 'alert error';
        statusMessage.style.display = 'block';
      }
    } finally {
      if(addBtn){ addBtn.disabled = false; addBtn.textContent = 'Adicionar produto'; }
      if(statusMessage && statusMessage.classList.contains('info')){
        setTimeout(()=> statusMessage.style.display='none', 3000);
      }
    }
  });

  // --- Editor modal logic ---
  function openEditModal(){
    $("editModal").classList.add('show');
    document.body.classList.add('modal-open');
  }
  function closeEditModal(){
    $("editModal").classList.remove('show');
    document.body.classList.remove('modal-open');
    editIndex = null;
    editPendingUploads = [];
    editImageList = [];
    editExistingCount = 0;
    const f = $("editForm");
    if(f) f.reset();
    const p = $("editPreview");
    if(p) p.innerHTML = '';
  }

  function renderEditImages(p){
    const container = $("editPreview");
    if(!container) return;
    container.innerHTML = '';
    const existing = [p.image, ...(p.gallery||[])].filter(Boolean);
    editExistingCount = existing.length;
    editImageList = [
      ...existing.map(u => ({kind:'existing', url:u})),
      ...editPendingUploads.map(x => ({kind:'new', url:x.url, file:x.file}))
    ];
    editImageList.forEach((img, idx) => {
      const div = document.createElement('div');
      div.className = 'preview';
      const removeBtn = img.kind === 'new'
        ? '<button type="button" class="remove" data-remove="'+idx+'">x</button>'
        : '';
      div.innerHTML = `
        <input type="radio" name="editCapa" value="${idx}">
        <img src="${img.url}" alt="img">
        ${removeBtn}
      `;
      container.appendChild(div);
    });

    const radio = container.querySelector('input[name="editCapa"][value="0"]');
    if(radio) radio.checked = true;

    container.querySelectorAll('.remove').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.getAttribute('data-remove'));
        const pendingIdx = idx - editExistingCount;
        if(pendingIdx >= 0){
          editPendingUploads.splice(pendingIdx, 1);
          renderEditImages(p);
        }
      });
    });
  }

  function editarProduto(index){
    editIndex = index;
    const p = produtos[index];
    if(!p) return;
    $("editIdBadge").textContent = p.id ? `ID: ${p.id}` : '';
    $("editTitulo").value = p.title || '';
    $("editValor").value = Number(p.price || 0);
    $("editDescricao").value = p.description || '';
    $("editCategoria").value = p.category || '';
    $("editEstoque").value = Number.isFinite(p.stock) ? p.stock : parseInt(p.stock || '0', 10);

    editPendingUploads = [];
    renderEditImages(p);
    openEditModal();
  }

  on($("editFotos"), 'change', (e) => {
    const files = Array.from(e.target.files || []);
    const p = produtos[editIndex];
    files.forEach(f => {
      const url = URL.createObjectURL(f);
      editPendingUploads.push({file:f, url});
    });
    if(p) renderEditImages(p);
    e.target.value = '';
  });

  on($("editCancel"), 'click', (e)=>{ e.preventDefault(); closeEditModal(); });
  on($("editCloseBtn"), 'click', (e)=>{ e.preventDefault(); closeEditModal(); });

  on($("editForm"), 'submit', async (e) => {
    e.preventDefault();
    if(editIndex === null) return;
    const saveBtn = $("editSave");
    if(saveBtn){ saveBtn.disabled = true; saveBtn.textContent = 'Salvando...'; }

    try{
      const p = produtos[editIndex];
      let newUrls = [];
      if(editPendingUploads.length){
        newUrls = await uploadImagens(p.id || p.ID || Date.now().toString(), editPendingUploads.map(x=>x.file));
      }
      const existing = [p.image, ...(p.gallery||[])].filter(Boolean);
      const images = [...existing, ...newUrls].filter(Boolean)
        .filter((u, idx, arr) => arr.indexOf(u) === idx);

      const sel = parseInt(document.querySelector('input[name="editCapa"]:checked')?.value || '0', 10);
      const selIdx = Math.max(0, Math.min(sel, images.length - 1));

      p.title = $("editTitulo").value;
      p.price = Number($("editValor").value || 0);
      p.description = $("editDescricao").value || '';
      p.category = $("editCategoria").value || '';
      p.stock = parseInt($("editEstoque").value || '0', 10);

      p.image = images[selIdx] || images[0] || '';
      p.gallery = images.filter((u, i) => i !== selIdx);

      const ok = await salvarNoGitHub(produtos);
      if(ok){
        renderProdutos();
        closeEditModal();
      }else{
        alert('Erro ao salvar no GitHub.');
      }
    }catch(err){
      alert('Falha ao salvar: ' + (err?.message || err));
    }finally{
      if(saveBtn){ saveBtn.disabled = false; saveBtn.textContent = 'Salvar'; }
    }
  });

  // --- GitHub modal bindings ---
  const ghModal = $("githubModal");
  on($("openGithubModal"), 'click', () => {
    loadGithubConfig();
    ghModal.classList.add('show');
    document.body.classList.add('modal-open');
    carregarProdutosGitHub();
  });
  on($("closeGithubModal"), 'click', () => {
    ghModal.classList.remove('show');
    document.body.classList.remove('modal-open');
    carregarProdutosGitHub();
  });

  function showGhAlert(msg, ok){
    const el = $("ghAlert");
    if(!el) return;
    text(el, msg);
    el.style.display = 'block';
    el.style.background = ok ? '#28a745' : '#c0392b';
    el.style.color = '#fff';
    setTimeout(()=> el.style.display='none', 3000);
  }
  function loadGithubConfig(){
    const cfg = JSON.parse(localStorage.getItem('ghConfig')||'{}');
    if(cfg.repo) $("ghRepo").value = cfg.repo;
    if(cfg.branch) $("ghBranch").value = cfg.branch;
    if(cfg.path) $("ghPath").value = cfg.path;
    if(cfg.token) $("ghToken").value = cfg.token;
  }
  function saveGithubConfig(){
    const cfg = {
      repo: $("ghRepo").value,
      branch: $("ghBranch").value,
      path: $("ghPath").value,
      token: $("ghToken").value
    };
    localStorage.setItem('ghConfig', JSON.stringify(cfg));
    showGhAlert('✅ Configurações salvas!', true);
  }
  async function testGithubConfig(){
    const cfg = JSON.parse(localStorage.getItem('ghConfig')||'{}');
    if(!cfg.repo || !cfg.branch || !cfg.path || !cfg.token){ showGhAlert('Preencha todos os campos antes de testar.', false); return; }
    try{
      const res = await fetch(`https://api.github.com/repos/${cfg.repo}/contents/${cfg.path}?ref=${cfg.branch}`, {
        headers: { Authorization: `token ${cfg.token}` }
      });
      if(res.ok){
        showGhAlert('✅ Conexão bem-sucedida!', true);
      } else {
        showGhAlert('❌ Erro: ' + res.status, false);
      }
    }catch(e){ showGhAlert('❌ Falha: ' + e.message, false); }
  }

  on($("saveGithubConfig"), 'click', saveGithubConfig);
  on($("testGithubConfig"), 'click', testGithubConfig);
  on($("downloadProducts"), 'click', downloadProductsJson);

  // initial load
  carregarProdutosGitHub();
})();</script>
