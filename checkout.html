<!-- ===== CHECKOUT FIXED — ID SAFE VERSION ===== -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* (estilo mantido exatamente igual ao seu) */
</style>
</head>
<body>

<div class="checkout-card">
  <img src="LOGO.png" class="logo">
  <h1>Checkout</h1>

  <div id="cartList" class="items"></div>

  <div class="summary">
    <div class="row"><span>Subtotal</span><span id="subtotalValue">€ 0.00</span></div>
    <div class="row"><span>Shipping</span><span id="shippingValue">€ 0.00</span></div>
    <div class="row total">Total: € <span id="totalAmount">0.00</span></div>
  </div>

  <div id="paypal-button-paypal"></div>
  <div id="paypal-button-card"></div>
</div>

<script src="https://www.paypal.com/sdk/js?client-id=SEU_CLIENT_ID&currency=EUR&intent=capture&commit=true&components=buttons,funding-eligibility&enable-funding=card"></script>

<script>
/* ===== CART ===== */
const CART_KEY = 'vw_cart';

function readCart(){
  try {
    return JSON.parse(localStorage.getItem(CART_KEY)) || [];
  } catch {
    return [];
  }
}

/* 🔥 FIX PRINCIPAL: NÃO PERDE O ID */
function normalizeCart(cart){
  return cart.map(item => ({
    id: String(item.id),          // 👈 ESSENCIAL
    title: item.title,
    price: Number(item.price),
    qty: Number(item.qty)
  })).filter(i => i.id && i.qty > 0);
}

const cart = normalizeCart(readCart());

/* ===== RENDER ===== */
function render(){
  const list = document.getElementById('cartList');
  let subtotal = 0;

  list.innerHTML = cart.map(i => {
    const sub = i.price * i.qty;
    subtotal += sub;
    return `<div class="item">
      <span>${i.qty}× ${i.title}</span>
      <strong>€ ${sub.toFixed(2)}</strong>
    </div>`;
  }).join('');

  document.getElementById('subtotalValue').textContent = `€ ${subtotal.toFixed(2)}`;
  document.getElementById('shippingValue').textContent = `€ 0.00`;
  document.getElementById('totalAmount').textContent = subtotal.toFixed(2);

  return subtotal;
}

const subtotal = render();

/* ===== PAYPAL ===== */
paypal.Buttons({
  createOrder(data, actions){
    return actions.order.create({
      intent: 'CAPTURE',
      purchase_units: [{
        amount: {
          currency_code: 'EUR',
          value: subtotal.toFixed(2),
          breakdown: {
            item_total: { currency_code: 'EUR', value: subtotal.toFixed(2) }
          }
        },
        items: cart.map(item => ({
          name: item.title,
          custom_id: item.id,     // 👈 ISSO CHEGA NO WEBHOOK
          unit_amount: {
            currency_code: 'EUR',
            value: item.price.toFixed(2)
          },
          quantity: item.qty.toString(),
          category: 'PHYSICAL_GOODS'
        }))
      }]
    });
  },

  onApprove(data, actions){
    return actions.order.capture().then(() => {
      alert('✅ Payment successful!');
      localStorage.removeItem(CART_KEY);
      location.reload();
    });
  },

  onError(err){
    console.error(err);
    alert('❌ PayPal error');
  }

}).render('#paypal-button-paypal');
</script>

</body>
</html>
