<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Checkout</title>
<link href="data:," rel="icon"/>
<link href="data:," rel="shortcut icon"/>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<style>
:root{
  --cream:#f6f1e7;
  --cream-2:#f3e9d8;
  --text:#2a2a2a;
  --muted:#6f6f6f;
  --olive:#6b7b2a;
  --mustard:#f1b332;
  --coral:#ff8e7f;
  --terracotta:#b33b2e;
  --card:#ffffff;
}
*{ box-sizing:border-box; margin:0; padding:0; font-family:'Poppins',sans-serif; }
body{
  background: linear-gradient(180deg, var(--cream), var(--cream-2));
  color:var(--text);
  display:flex; justify-content:center; align-items:center; min-height:100vh; padding:20px;
}
.checkout-card{
  background:var(--card);
  border:1px solid rgba(0,0,0,.06);
  border-radius:18px;
  box-shadow:0 10px 28px rgba(0,0,0,.08);
  max-width:660px; width:100%; padding:28px 22px; text-align:center;
}
.logo{
  width:220px; border-radius:16px; border:2px solid var(--mustard);
  box-shadow:0 10px 24px rgba(0,0,0,.10);
  margin:0 auto 14px;
  display:block;
}
h1{ color:var(--terracotta); font-size:22px; margin-bottom:12px; text-transform:uppercase; letter-spacing:.06em; }
.summary{ margin:18px 0; }
.row{ display:flex; justify-content:space-between; align-items:center; margin:8px 0; font-size:14px; }
.row.total{ font-size:20px; font-weight:900; color:var(--olive); margin-top:12px; }
.items{ text-align:left; margin:10px 0 6px; }
.item{ display:flex; justify-content:space-between; gap:12px; margin:6px 0; }
.item-title{ font-size:14px; font-weight:600; color:#2a2a2a; }
.item-sub{ font-weight:800; color:var(--terracotta); }
#paypal-section{ margin-top:16px; }
#paypal-button-paypal, #paypal-button-card{ margin-bottom:12px; }
.helper{ margin-top:12px; font-size:13px; color:var(--muted); }
footer{ margin-top:16px; color:var(--muted); font-size:12px; }
.hidden{ display:none !important; }
</style>
</head>
<body>
<div class="checkout-card">
<img alt="Checkout" class="logo" src="LOGO.png"/>
<h1>Checkout</h1>
<div class="items" id="cartList"></div>
<div class="summary">
<div class="row"><span class="label">Products Subtotal</span><span class="value" id="subtotalValue">€ 0.00</span></div>
<div class="row"><span class="label" id="shippingLabel">Shipping</span><span class="value" id="shippingValue">€ 0.00</span></div>
<div class="row total">Total: € <span id="totalAmount">0.00</span></div>
</div><div id="deliveryPickup" style="margin:14px 0; text-align:left; border:1px dashed rgba(0,0,0,.12); border-radius:10px; padding:12px;"><div style="font-weight:800; margin-bottom:8px;">Delivery / Pickup</div><label style="display:flex; align-items:flex-start; gap:10px; cursor:pointer; margin-bottom:8px;"><input name="deliveryMethod" type="radio" value="shipping"/><span>Shipping (€9)<br/><div style="font-size:12px; color:#6f6f6f;">Estimated delivery time: 7 to 10 business days.</div></span></label><label style="display:flex; align-items:flex-start; gap:10px; cursor:pointer;"><input name="deliveryMethod" type="radio" value="pickup"/><span>Pickup<br/><div style="font-size:12px; color:#6f6f6f;">Shopping Centre Athenry Prospect Unit 11B - H65 VA48</div></span></label></div>

<div id="paypal-section">
<div id="paypal-button-paypal"></div>
<div id="paypal-button-card"></div>
<div class="helper hidden" id="helperMsg">Add products to your cart to enable payment.</div>
</div>
<footer>© <span id="year"></span> Checkout</footer>
</div>
<script src="https://www.paypal.com/sdk/js?client-id=AfTde7kvXeDpijvvMVxUcfb7b-XIQgWMnQ8W2rcUd8PX5wyHAddc-Xf0_VG_wLUVl0dNw_9HXAzpo6dt¤cy=EUR&amp;intent=capture&amp;commit=true&amp;locale=en_IE&amp;components=buttons,funding-eligibility&amp;enable-funding=card"></script>
<script>
// ===== Keys used by the site =====
const CART_KEYS_ORDER = ['vw_cart','hs_cart','cart','v_cart','cartItems','cart_items','cartData'];
const SHIP_KEYS_ORDER = ['vw_shipping','hs_shipping','shipping','ship'];

// Year
document.getElementById('year').textContent = new Date().getFullYear();

function fmtEUR(n){ return '€ ' + Number(n).toFixed(2); }

function readJSON(key){
  try{ return JSON.parse(localStorage.getItem(key)); }catch(e){ return null; }
}

// Cart: first key that contains a non-empty array
function readCart(){
  for(const k of CART_KEYS_ORDER){
    const v = readJSON(k);
    if(Array.isArray(v) && v.length) return v;
  }
  return [];
}

// Shipping: first key that contains an object/number; else try ?shipping=; else 0
function readShipping(){
  for(const k of SHIP_KEYS_ORDER){
    const v = readJSON(k);
    if(v && typeof v === 'object' && typeof v.amount === 'number'){
      return { amount: Number(v.amount)||0, label: v.label || 'Shipping' };
    }
    const raw = localStorage.getItem(k);
    if(raw && !isNaN(Number(raw))){
      return { amount: Number(raw), label:'Shipping' };
    }
  }
  const q = new URLSearchParams(location.search).get('shipping');
  const qNum = q !== null ? Number(q) : NaN;
  if(!Number.isNaN(qNum)){
    return { amount: qNum, label: qNum === 10 ? 'Tracked (€10)' : (qNum === 7 ? 'Untracked (€7)' : 'Shipping') };
  }
  return { amount: 0, label: 'Shipping' };
}

// Normalize product fields (title/price/qty) for different cart formats
function normalizeCart(arr){
  return arr.map(item=>{
    const qty = Number(item.qty ?? item.quantity ?? 1) || 0;
    const price = Number(item.price ?? item.unitPrice ?? 0) || 0;
    const title = item.title ?? item.name ?? item.product?.title ?? 'Product';
    return { qty, price, title };
  }).filter(x => x.qty > 0 && x.price >= 0);
}

let cart = normalizeCart(readCart());

function renderSummary(){
  const list = document.getElementById('cartList');
  let subtotal = 0;
  if(!cart.length){
    list.innerHTML = '<p style="color:#6f6f6f;text-align:center;">Your cart is empty.</p>';
  }else{
    list.innerHTML = cart.map(item=>{
      const sub = item.qty * item.price; subtotal += sub;
      return `<div class="item">
                <div class="item-title">${item.qty}× ${item.title}</div>
                <div class="item-sub">${fmtEUR(sub)}</div>
              </div>`;
    }).join('');
  }
  const ship = readShipping();
  document.getElementById('subtotalValue').textContent = fmtEUR(subtotal);
  document.getElementById('shippingLabel').textContent = ship.label || 'Shipping';
  document.getElementById('shippingValue').textContent = fmtEUR(ship.amount || 0);

  let effectiveTotal = 0;
  const helper = document.getElementById('helperMsg');
  const payBtn = document.getElementById('paypal-button-paypal');
  const cardBtn = document.getElementById('paypal-button-card');
  if(subtotal > 0){
    effectiveTotal = subtotal + Number(ship.amount||0);
    helper.classList.add('hidden');
    payBtn.classList.remove('hidden');
    cardBtn.classList.remove('hidden');
  }else{
    effectiveTotal = 0;
    helper.classList.remove('hidden');
    payBtn.classList.add('hidden');
    cardBtn.classList.add('hidden');
  }
  document.getElementById('totalAmount').textContent = effectiveTotal.toFixed(2);
  return { subtotal, shipping: Number(ship.amount||0), total: effectiveTotal };
}

const state = renderSummary();

// Função comum de config
function commonConfig(){
  return {
    onClick: function(data, actions){
      const { subtotal } = renderSummary();
      if(subtotal <= 0){
        alert('Please add products before paying.');
        return actions.reject();
      }
      return actions.resolve();
    },
    createOrder: function(data, actions){
      const { subtotal, shipping, total } = renderSummary();
      if(subtotal <= 0){ throw new Error('Empty subtotal'); }

      // montar os items pro PayPal
      const items = cart.map(item => ({
        name: item.title,
        unit_amount: {
          currency_code: 'EUR',
          value: item.price.toFixed(2)
        },
        quantity: item.qty.toString()
      }));

      return actions.order.create({
        purchase_units:[{
          description:'Checkout Order',
          amount:{
            value: total.toFixed(2),
            currency_code:'EUR',
            breakdown: {
              item_total: {
                currency_code: 'EUR',
                value: subtotal.toFixed(2)
              },
              shipping: {
                currency_code: 'EUR',
                value: shipping.toFixed(2)
              }
            }
          },
          items: items
        }]
      });
    },
    onApprove: function(data, actions){
      return actions.order.capture().then(function(details){
        alert('✅ Payment completed by ' + (details?.payer?.name?.given_name || 'customer') + '!');
        // limpar carrinho
        CART_KEYS_ORDER.forEach(k=>localStorage.removeItem(k));
        document.getElementById('cartList').innerHTML = '<p style="color:var(--olive);text-align:center;">Payment Approved!</p>';
        document.getElementById('subtotalValue').textContent = fmtEUR(0);
        document.getElementById('shippingValue').textContent = fmtEUR(0);
        document.getElementById('totalAmount').textContent = '0.00';
        document.getElementById('paypal-button-paypal').classList.add('hidden');
        document.getElementById('paypal-button-card').classList.add('hidden');
      });
    },
    onError: function(err){ console.error('PayPal error:', err); alert('❌ There was an issue with PayPal Checkout. Please try again.'); }
  };
}

// render dos botões
if(typeof paypal !== 'undefined' && state.subtotal > 0){
  const btnPayPal = paypal.Buttons(Object.assign({}, commonConfig(), {
    fundingSource: paypal.FUNDING.PAYPAL,
    style:{ layout:'vertical', color:'gold', shape:'pill', label:'paypal', height:45 }
  }));
  if(btnPayPal.isEligible()) btnPayPal.render('#paypal-button-paypal');

  const btnCard = paypal.Buttons(Object.assign({}, commonConfig(), {
    fundingSource: paypal.FUNDING.CARD,
    style:{ layout:'vertical', color:'black', shape:'pill', label:'pay', height:45 }
  }));
  if(btnCard.isEligible()) btnCard.render('#paypal-button-card');
}
</script>
<script>
(function(){
  function setShipping(amount, label){
    try {
      localStorage.setItem('vw_shipping', JSON.stringify({ amount: amount, label: label, ts: Date.now() }));
    } catch(e){}
  }
  function initRadios(){
    var shipAmount = 0;
    try {
      var v = JSON.parse(localStorage.getItem('vw_shipping'));
      if (v && typeof v.amount === 'number') shipAmount = v.amount;
    } catch(e){}
    var q = new URLSearchParams(location.search).get('shipping');
    var qNum = q !== null ? Number(q) : NaN;
    if(!Number.isNaN(qNum)) shipAmount = qNum;
    var shipInput = document.querySelector('input[name="deliveryMethod"][value="shipping"]');
    var pickInput = document.querySelector('input[name="deliveryMethod"][value="pickup"]');
    if(shipAmount >= 9 && shipInput){ shipInput.checked = true; }
    else if(pickInput){ pickInput.checked = true; }
  }
  document.addEventListener('change', function(e){
    if(e.target && e.target.name === 'deliveryMethod'){
      if(e.target.value === 'shipping'){ setShipping(9, 'Shipping (€9)'); }
      else { setShipping(0, 'Pickup'); }
      try { if(typeof renderSummary === 'function') renderSummary(); } catch(err){}
    }
  });
  document.addEventListener('DOMContentLoaded', initRadios);
})();
</script></body>
</html>
