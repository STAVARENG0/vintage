<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Vintage Wear | Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet"/>
<style>
:root{
  /* paleta padrão (igual ao index) */
  --bg-1:#f6f1e7;
  --bg-2:#f3e9d8;
  --text:#2b2723;
  --muted:#7c6f63;
  --accent:#d68d28;
  --accent-2:#f0b43b;
  --accent-dark:#9a5b18;
  --card:#ffffff;
  --border:#e0d5c2;
  --radius:20px;

  /* ouro / botões brancos com borda dourada */
  --gold:#D4AF37;
  --gold-light:#F5D76E;
  --gold-deep:#8D6E21;
  --gold-soft: rgba(212,175,55,.55);
  --btn-bg: rgba(255,255,255,.88);
  --btn-text:#3b2206;
}
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Poppins, Arial, sans-serif;
  background:linear-gradient(135deg,#fdf4e3,#f1dfc2,#e3c395);
  color:var(--text);
  min-height:100svh;
  padding:24px 10px;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow-x:hidden;
}

/* campo reativo dourado (canvas) */
#reactiveField{
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
}

.wrap{
  width:min(92vw,520px);
  margin:0 auto;
  position:relative;
  z-index:1;
}

.card{
  background:linear-gradient(135deg,rgba(253,244,227,0.10),rgba(241,223,194,0.08),rgba(227,195,149,0.14));
  backdrop-filter:saturate(120%) blur(6px);
  -webkit-backdrop-filter:saturate(120%) blur(6px);
  border-radius:28px;
  border:1px solid rgba(212,175,55,.55);
  box-shadow:0 18px 42px rgba(0,0,0,.32), 0 0 26px rgba(212,175,55,.22);
  padding:30px;
}

.brand{
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:10px;
  flex-direction:column;
}

.brand img{
  max-width:220px;
  height:auto;
  display:block;
  border-radius:18px;
  background:transparent;
  border:0;
  box-shadow:none;
  filter:
    drop-shadow(0 0 2px rgba(255,255,255,0.98))
    drop-shadow(0 0 10px rgba(255,255,255,0.85))
    drop-shadow(0 0 22px rgba(235,255,255,0.60))
    drop-shadow(0 0 44px rgba(200,255,255,0.35));
}

/* linha dourada (igual ao header) */
.brand::after{
  content:"";
  display:block;
  width:min(420px,92%);
  height:2px;
  margin:12px auto 2px;
  background:linear-gradient(90deg,transparent, rgba(212,175,55,.95), transparent);
  border-radius:999px;
  box-shadow:0 10px 22px rgba(212,175,55,.20);
}

h1{
  margin:0 0 14px;
  font-size:1.25rem;
  text-align:center;
}

label{
  font-size:.9rem;
  color:var(--muted);
  display:block;
  margin:10px 0 6px;
}

input{
  width:100%;
  padding:12px 14px;
  border-radius:999px;
  border:1px solid var(--gold-soft);
  background:rgba(255,255,255,.90);
  color:var(--text);
  font-size:15px;
  box-shadow:0 10px 26px rgba(0,0,0,.08);
  outline:none;
}

input:focus{
  border-color: rgba(212,175,55,.85);
  box-shadow:0 10px 26px rgba(0,0,0,.08), 0 0 0 3px rgba(212,175,55,.16);
}

button{
  width:100%;
  padding:12px 14px;
  border-radius:999px;
  background: var(--btn-bg);
  color: var(--btn-text);
  border: 1px solid var(--gold-soft);
  font-weight:700;
  cursor:pointer;
  margin-top:14px;
  box-shadow:0 10px 26px rgba(0,0,0,.10);
  transition: transform .15s ease, filter .15s ease;
}

button:hover{
  filter:brightness(1.03);
  transform:translateY(-1px);
  background:
    radial-gradient(circle at 30% 20%, rgba(255,255,255,.95), transparent 60%),
    linear-gradient(120deg, rgba(212,175,55,.22), rgba(240,180,59,.22));
  border-color: rgba(212,175,55,.75);
}

button:active{
  transform:translateY(0);
  filter:brightness(.99);
}

.err{
  color:#8a1f1f;
  background:rgba(255,230,230,.95);
  border:1px solid rgba(242,179,179,.9);
  padding:10px 12px;
  border-radius:14px;
  display:none;
  margin:0 0 12px;
  text-align:center;
}

a.small{
  display:block;
  text-align:center;
  color:var(--muted);
  font-size:.9rem;
  text-decoration:none;
  margin-top:12px;
}
a.small:hover{ filter:brightness(1.05); }

@media (max-width: 600px){
  .brand img{ max-width:180px; }
  .card{ padding:26px 18px; }
}
</style>
</head>
<body>
  <canvas id="reactiveField" aria-hidden="true"></canvas>
  <div class="wrap">
  <div class="card">
    <div class="brand">
      <img src="LOGO.png" alt="Vintage Wear logo">
    </div>
    <h1>Sign in — Vintage Wear</h1>
    <div id="err" class="err">Invalid username or password.</div>
    <form id="loginForm" autocomplete="off">
      <label for="u">Username</label>
      <input type="text" id="u" autocomplete="username" required placeholder="your username">
      <label for="p">Password</label>
      <input type="password" id="p" autocomplete="current-password" required placeholder="your password">
      <button type="submit">Sign in</button>
      <a class="small" href="index.html">← Back to site</a>
    </form>
  </div>
  </div>

<script>
  // Requested credentials
  const VALID_USER = 'karla';
  const VALID_PASS = 'mel3326';

  const form = document.getElementById('loginForm');
  form.addEventListener('submit', function(e){
    e.preventDefault();
    const u = document.getElementById('u').value.trim();
    const p = document.getElementById('p').value;
    const err = document.getElementById('err');

    if (u === VALID_USER && p === VALID_PASS) {
      sessionStorage.setItem('vw_panel_logged_in','1');
      location.href = 'painel_vintage_wear.html';
    } else {
      err.style.display = 'block';
      err.textContent = 'Invalid username or password.';
      err.animate([{ transform: 'translateX(-6px)' }, { transform: 'translateX(6px)' }, { transform: 'translateX(0)' }], { duration: 300 });
    }
  });
</script>
<script>
(() => {
  // Campo reativo dourado (mesmo efeito do Artesanato)
  const GOLD = getComputedStyle(document.documentElement).getPropertyValue('--gold').trim() || '#D4AF37';
  const GOLD_LIGHT = getComputedStyle(document.documentElement).getPropertyValue('--gold-light').trim() || '#F5D76E';
  const GOLD_DEEP = getComputedStyle(document.documentElement).getPropertyValue('--gold-deep').trim() || '#8D6E21';

  const MAX_PARTICLES_BASE = 135;
  const LINK_DIST = 170;
  const SAFETY_MARGIN = 22;
  const MOUSE_REPEL_RADIUS = 120 + SAFETY_MARGIN;
  const MOUSE_FORCE = 0.14;
  const SPEED = 0.55;
  const FRICTION = 0.965;
  const CURVE = true;
  const GLOW = true;

  const canvas = document.getElementById('reactiveField');
  if (!canvas) return;
  const ctx = canvas.getContext('2d', { alpha: true });
  let DPR = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
  let W = 0, H = 0;

  function resize(){
    W = canvas.clientWidth = window.innerWidth;
    H = canvas.clientHeight = window.innerHeight;
    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    ctx.setTransform(DPR,0,0,DPR,0,0);
  }
  resize();

  window.addEventListener('resize', () => {
    DPR = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
    resize();
    init();
  });

  const pts = [];
  function rand(min,max){ return Math.random()*(max-min)+min; }

  function init(){
    pts.length = 0;
    const area = W * H;
    const target = Math.min(250, Math.round(MAX_PARTICLES_BASE * (area / (1200*900))));
    for(let i=0;i<target;i++){
      pts.push({
        x: rand(0,W),
        y: rand(0,H),
        vx: rand(-SPEED,SPEED),
        vy: rand(-SPEED,SPEED),
        r: rand(2.1,3.6)
      });
    }
  }
  init();

  const mouse = { x:-9999, y:-9999, active:false };
  document.addEventListener('mousemove', (e)=>{
    mouse.x = e.clientX;
    mouse.y = e.clientY;
    mouse.active = true;
  }, {passive:true});
  document.addEventListener('mouseleave', ()=>{ mouse.active = false; }, {passive:true});

  function drawDot(p){
    const g = ctx.createRadialGradient(p.x-1, p.y-1, 0, p.x, p.y, p.r*1.6);
    g.addColorStop(0, GOLD_LIGHT);
    g.addColorStop(0.55, GOLD);
    g.addColorStop(1, GOLD_DEEP);
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
    if(GLOW){
      ctx.save();
      ctx.globalAlpha = .25;
      ctx.shadowColor = GOLD;
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fill();
      ctx.restore();
    }
  }

  function drawLink(a,b,dist){
    const t = 1 - (dist / LINK_DIST);
    const lw = 1 + t * 2.2;
    const alpha = 0.12 + t * 0.6;

    const grad = ctx.createLinearGradient(a.x, a.y, b.x, b.y);
    grad.addColorStop(0, GOLD);
    grad.addColorStop(0.5, GOLD_LIGHT);
    grad.addColorStop(1, GOLD);

    ctx.strokeStyle = grad;
    ctx.lineWidth = lw;
    ctx.globalAlpha = alpha;

    if(CURVE){
      const mx = (a.x + b.x)/2, my = (a.y + b.y)/2;
      const dx = b.x - a.x, dy = b.y - a.y;
      const len = Math.hypot(dx,dy) || 1;
      const nx = -dy/len, ny = dx/len;
      const bend = 10 + 26 * t;
      const cx = mx + nx * bend;
      const cy = my + ny * bend;
      ctx.beginPath();
      ctx.moveTo(a.x,a.y);
      ctx.quadraticCurveTo(cx,cy,b.x,b.y);
      ctx.stroke();
    }else{
      ctx.beginPath();
      ctx.moveTo(a.x,a.y);
      ctx.lineTo(b.x,b.y);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  function step(){
    ctx.clearRect(0,0,W,H);

    for(const p of pts){
      if(mouse.active){
        const dx = p.x - mouse.x;
        const dy = p.y - mouse.y;
        const d2 = dx*dx + dy*dy;
        const r2 = MOUSE_REPEL_RADIUS * MOUSE_REPEL_RADIUS;
        if(d2 < r2){
          const d = Math.sqrt(d2) || 0.0001;
          const force = (1 - d / MOUSE_REPEL_RADIUS) * MOUSE_FORCE;
          p.vx += (dx / d) * force * 5.0;
          p.vy += (dy / d) * force * 5.0;
        }
      }

      p.vx += (Math.random()-0.5)*0.02;
      p.vy += (Math.random()-0.5)*0.02;

      p.vx *= FRICTION;
      p.vy *= FRICTION;
      p.x += p.vx;
      p.y += p.vy;

      if(p.x < 0){ p.x = 0; p.vx = Math.abs(p.vx); }
      if(p.x > W){ p.x = W; p.vx = -Math.abs(p.vx); }
      if(p.y < 0){ p.y = 0; p.vy = Math.abs(p.vy); }
      if(p.y > H){ p.y = H; p.vy = -Math.abs(p.vy); }
    }

    for(let i=0;i<pts.length;i++){
      for(let j=i+1;j<pts.length;j++){
        const a = pts[i], b = pts[j];
        const dx = b.x - a.x, dy = b.y - a.y;
        const dist = Math.hypot(dx,dy);
        if(dist < LINK_DIST){
          drawLink(a,b,dist);
        }
      }
    }

    for(const p of pts) drawDot(p);
    requestAnimationFrame(step);
  }
  step();
})();
</script>
</body>
</html>
