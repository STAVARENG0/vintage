<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>VintageShop — WOMAN</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#f6f1e7; --cream-2:#f3e9d8; --text:#2a2a2a; --muted:#6f6f6f;
    --olive:#6b7b2a; --mustard:#f1b332; --terracotta:#b33b2e; --card:#ffffff;
  }
  *{box-sizing:border-box}
  body{ margin:0; font-family:Poppins,system-ui,Arial,sans-serif; color:var(--text); background:linear-gradient(180deg,var(--cream),var(--cream-2)); min-height:100vh; }
  .wrap{ max-width:1200px; margin:0 auto; padding:28px; }
  header{ text-align:center; margin-bottom:10px; }
  h1{ margin:0; font-size:clamp(20px,4vw,40px); letter-spacing:.08em; color:var(--olive); }
  .subtitle{ color:var(--muted); margin-top:8px; }
  .controls{ display:flex; gap:8px; justify-content:center; margin:16px 0; flex-wrap:wrap; }
  .btn{ background:linear-gradient(90deg,var(--olive),var(--mustard)); color:#fff; padding:10px 14px; border-radius:999px; text-decoration:none; font-weight:700; border:none; cursor:pointer; }
  .grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:18px; margin-top:12px; }
  .product{ background:var(--card); border-radius:12px; overflow:hidden; box-shadow:0 10px 28px rgba(0,0,0,.06); display:flex; flex-direction:column; }
  .thumb{ width:100%; aspect-ratio:1/1; object-fit:cover; display:block; background:#f6f6f6; }
  .body{ padding:12px 14px 16px; display:flex; flex-direction:column; gap:8px; }
  .title{ font-weight:700; font-size:15px; margin:0; color:var(--text); }
  .desc{ color:var(--muted); font-size:13px; min-height:36px; }
  .price{ margin-top:auto; font-weight:800; color:var(--terracotta); }
  .empty{ text-align:center; color:var(--muted); margin-top:30px; }
  .notice{ text-align:center; padding:10px; border-radius:8px; display:none; margin-top:10px; }
  .notice.info{ background: #fff3cd; color:#856404; display:none; }
  .notice.success{ background:#d4edda; color:#155724; display:none; }
  .notice.error{ background:#f8d7da; color:#721c24; display:none; }
  footer{ text-align:center; color:var(--muted); margin-top:22px; font-size:13px; }
  @media (max-width:600px){ .grid{ grid-template-columns:repeat(2,1fr) } }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>VintageShop — Categoria WOMAN</h1>
    <div class="subtitle">Esta página apresenta apenas produtos marcados como <strong>WOMAN</strong> (filtragem case-insensitive).</div>
  </header>

  <div class="controls">
    <button class="btn" id="reloadBtn">Recarregar produtos</button>
    <button class="btn" id="downloadBtn">Baixar products.json</button>
  </div>

  <div id="notice" class="notice info">Carregando produtos…</div>

  <main>
    <div id="grid" class="grid" aria-live="polite"></div>
    <div id="empty" class="empty" style="display:none">Nenhum produto WOMAN encontrado.</div>
  </main>

  <footer>Se você utiliza o painel, publique/atualize o arquivo <code>products.json</code> no repositório — esta página lerá automaticamente.</footer>
</div>

<script>
  // util: decode base64 utf8 (for GitHub API content)
  function decodeBase64Utf8(b64){
    try{
      b64 = (b64 || '').replace(/\\n/g,'');
      const bin = atob(b64);
      const bytes = new Uint8Array(bin.length);
      for(let i=0;i<bin.length;i++) bytes[i] = bin.charCodeAt(i);
      return new TextDecoder().decode(bytes);
    }catch(e){
      try { return atob(b64 || ''); } catch(e2){ return ''; }
    }
  }
  function showNotice(msg, type='info', timeout=3000){
    const el = document.getElementById('notice');
    el.textContent = msg;
    el.className = 'notice ' + type;
    el.style.display = 'block';
    if(timeout) setTimeout(()=> el.style.display='none', timeout);
  }

  // Attempt load order:
  // 1) localStorage 'produtos' (if exists and is array)
  // 2) /products.json (relative path)
  // 3) GitHub API using localStorage ghConfig if present (same keys as painel)
  async function loadProductsRaw(){
    // 1) from localStorage
    try{
      const raw = localStorage.getItem('produtos') || localStorage.getItem('products') || null;
      if(raw){
        const parsed = JSON.parse(raw);
        if(Array.isArray(parsed)) return parsed;
      }
    }catch(e){ /* ignore */ }

    // 2) try fetch ./products.json
    try{
      const res = await fetch('./products.json', {cache: 'no-store'});
      if(res.ok){
        const data = await res.json();
        if(Array.isArray(data)) return data;
        // sometimes file wrapped like { products: [...] }
        if(data && Array.isArray(data.products)) return data.products;
      }
    }catch(e){ /* ignore */ }

    // 3) try GitHub repo config in localStorage (ghConfig)
    try{
      const cfg = JSON.parse(localStorage.getItem('ghConfig') || '{}');
      if(cfg.repo && cfg.path){
        showNotice('Buscando products.json do GitHub…', 'info', 4000);
        const api = `https://api.github.com/repos/${cfg.repo}/contents/${cfg.path}?ref=${cfg.branch||'main'}`;
        const res = await fetch(api, { headers: cfg.token ? { Authorization: 'token ' + cfg.token } : {} });
        if(res.ok){
          const json = await res.json();
          const txt = decodeBase64Utf8(json.content || '');
          const parsed = JSON.parse(txt || '[]');
          if(Array.isArray(parsed)) return parsed;
          if(parsed && Array.isArray(parsed.products)) return parsed.products;
        } else {
          // try raw.githubusercontent fallback
          const rawUrl = `https://raw.githubusercontent.com/${cfg.repo}/${cfg.branch||'main'}/${cfg.path}`;
          const r2 = await fetch(rawUrl);
          if(r2.ok){
            const p = await r2.json();
            if(Array.isArray(p)) return p;
            if(p && Array.isArray(p.products)) return p.products;
          }
        }
      }
    }catch(e){ console.warn('git fetch fail', e); }

    return []; // nothing found
  }

  function filterWoman(products){
    if(!Array.isArray(products)) return [];
    return products.filter(p => {
      const cat = (p.category || p.categories || p.gender || '').toString().toLowerCase();
      // accept many variants: woman, women, feminino, female, WOMAN
      return ['woman','women','female','feminino','womans','woman '].some(v => cat.includes(v)) || (String(p.category||'').toUpperCase()==='WOMAN');
    });
  }

  function render(products){
    const grid = document.getElementById('grid');
    const empty = document.getElementById('empty');
    grid.innerHTML = '';
    if(!products || !products.length){
      empty.style.display = 'block';
      grid.style.display = 'none';
      return;
    }
    empty.style.display = 'none';
    grid.style.display = 'grid';
    products.forEach(p => {
      const div = document.createElement('article');
      div.className = 'product';
      const img = document.createElement('img');
      img.className = 'thumb';
      img.alt = p.title || 'Produto';
      img.src = p.image || (p.gallery && p.gallery[0]) || 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600"><rect width="100%" height="100%" fill="%23f6f6f6"/><text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="%236f6f6f" font-size="20">Sem imagem</text></svg>';
      const b = document.createElement('div');
      b.className = 'body';
      const h = document.createElement('h3');
      h.className = 'title';
      h.textContent = p.title || 'Untitled';
      const desc = document.createElement('div');
      desc.className = 'desc';
      desc.textContent = p.description || p.subtitle || '';
      const price = document.createElement('div');
      price.className = 'price';
      price.textContent = (typeof p.price !== 'undefined') ? ('€ ' + Number(p.price).toFixed(2)) : '';
      b.appendChild(h);
      b.appendChild(desc);
      b.appendChild(price);
      div.appendChild(img);
      div.appendChild(b);
      grid.appendChild(div);
    });
  }

  async function loadAndShow(){
    showNotice('Carregando produtos…', 'info', 2000);
    try{
      const raw = await loadProductsRaw();
      const woman = filterWoman(raw);
      render(woman);
      if(woman.length) showNotice(woman.length + ' produto(s) WOMAN carregado(s).', 'success', 2500);
      else showNotice('Nenhum produto WOMAN encontrado.', 'error', 3500);
    }catch(e){
      console.error(e);
      showNotice('Erro ao carregar produtos: ' + (e.message||e), 'error', 4000);
    }
  }

  document.getElementById('reloadBtn').addEventListener('click', loadAndShow);
  document.getElementById('downloadBtn').addEventListener('click', async ()=>{
    // try to download current products (filtered full array)
    showNotice('Preparando download…', 'info', 1500);
    try{
      const raw = await loadProductsRaw();
      const blob = new Blob([JSON.stringify(raw, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'products.json';
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(()=> URL.revokeObjectURL(url), 1500);
      showNotice('Arquivo preparado para download.', 'success', 2000);
    }catch(e){
      showNotice('Erro ao gerar download: '+ (e.message||e), 'error',4000);
    }
  });

  // initial load
  loadAndShow();
</script>
</body>
</html>
